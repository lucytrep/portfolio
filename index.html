<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucille Trepanier — Product Designer</title>
  <link rel="icon" href="assets/cursor.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/common.css" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    .hero-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Explore overlay — hidden until video ends */
    #interaction-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.8s ease;
    }

    #interaction-overlay.is-active {
      background: rgba(255, 255, 255, 0.9);
      pointer-events: auto;
    }

    .overlay-headline {
      font-family: var(--font-sans, sans-serif);
      font-size: clamp(1.75rem, 3.5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #000;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease 0.15s, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s;
      max-width: 80vw;
      line-height: 1.15;
      margin: 0 0 1.75rem 0;
    }

    #interaction-overlay.is-active .overlay-headline {
      opacity: 1;
      transform: translateY(0);
    }

    #explore-btn {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
    }

    #interaction-overlay.is-active #explore-btn {
      opacity: 1;
      transform: translateY(0);
    }

    #explore-btn a {
      display: inline-block;
      font-family: var(--font-sans, sans-serif);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border: 1.5px solid #000;
      padding: 0.7rem 2rem;
      border-radius: 999px;
      background: #000;
      transition: background 0.2s ease, color 0.2s ease;
    }

    #explore-btn a:hover {
      background: #222;
      border-color: #222;
    }

    #page-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: transparent !important;
      border-bottom-color: transparent !important;
    }

    #page-header .site-name,
    #page-header .site-tagline,
    #page-header nav a {
      color: #000 !important;
    }

    #page-header .hamburger-bar {
      background: #000 !important;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      if (window.location.hostname === 'lucytrep.github.io') {
        window.location.replace('case-studies/');
      }
    })();
  </script>

  <header class="container page-header" id="page-header">
    <div class="grid-12 header-grid">
      <div class="span-6">
        <a href="./" class="site-name">LUCILLE TREPANIER</a>
        <span class="site-tagline">Product Designer</span>
      </div>
      <button type="button" class="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="main-nav">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
      <nav class="span-6" id="main-nav">
        <a href="case-studies/">Work</a>
        <a href="archive/">Archive</a>
        <a href="https://lucytrep.github.io/" target="_blank" rel="noopener noreferrer">Code</a>
        <a href="about/">About</a>
        <a href="assets/LucyTrepanier_Resume.pdf" target="_blank" rel="noopener noreferrer">Resume</a>
      </nav>
    </div>
  </header>

  <!-- Video plays once, then loops silently behind the overlay -->
  <video class="hero-video" id="hero-video" src="assets/HeroVideo.mp4" autoplay muted playsinline></video>

  <div id="interaction-overlay">
    <p class="overlay-headline">See what I'm building.</p>
    <div id="explore-btn"><a href="case-studies/">Explore</a></div>
  </div>

  <script>
    var video   = document.getElementById('hero-video');
    var overlay = document.getElementById('interaction-overlay');

    video.addEventListener('ended', function () {
      // Loop the video silently behind the overlay
      video.loop = true;
      video.play().catch(function () {});
      // Fade in the explore overlay
      overlay.classList.add('is-active');
    });
  </script>

  <script src="js/main.js"></script>
</body>
</html>
